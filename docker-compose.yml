services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fairwayiq
      POSTGRES_USER: fairwayiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fairwayiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fairwayiq:${POSTGRES_PASSWORD}@postgres:5432/fairwayiq
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3000
      GOLF_COURSE_API_KEY: ${GOLF_COURSE_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
      APP_URL: ${APP_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      GARMIN_CONSUMER_KEY: ${GARMIN_CONSUMER_KEY:-}
      GARMIN_CONSUMER_SECRET: ${GARMIN_CONSUMER_SECRET:-}
      GARMIN_CALLBACK_URL: ${GARMIN_CALLBACK_URL:-fairwayiq://wearables/garmin/callback}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      ML_SERVICE_URL: http://swing-ml:8000
      ML_WEBHOOK_SECRET: ${ML_WEBHOOK_SECRET}
    volumes:
      - uploads:/app/uploads
    ports:
      - "127.0.0.1:3001:3000"

  swing-ml:
    build:
      context: .
      dockerfile: services/swing-ml/Dockerfile
    restart: unless-stopped
    environment:
      ML_WEBHOOK_SECRET: ${ML_WEBHOOK_SECRET}
    ports:
      - "127.0.0.1:8001:8000"

volumes:
  postgres_data:
  uploads:
